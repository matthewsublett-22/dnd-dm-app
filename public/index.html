<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Dungeon Master</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f0f13; color: #e0d9cc; font-family: 'Georgia', serif; min-height: 100vh; }
  .app { max-width: 900px; margin: 0 auto; padding: 20px; }
  h1 { font-size: 28px; color: #c9a84c; text-align: center; margin-bottom: 4px; letter-spacing: 2px; }
  .subtitle { text-align: center; color: #666; font-size: 13px; margin-bottom: 24px; }
  .screen { display: none; }
  .screen.active { display: block; }
  .card { background: #1a1a24; border: 1px solid #2a2a3a; border-radius: 8px; padding: 20px; margin-bottom: 16px; }
  h2 { color: #c9a84c; font-size: 18px; margin-bottom: 16px; }
  h3 { color: #c9a84c; font-size: 15px; margin-bottom: 10px; }
  label { font-size: 12px; color: #888; display: block; margin-bottom: 4px; font-family: sans-serif; }
  input[type=text], textarea, select { width: 100%; background: #0f0f13; border: 1px solid #2a2a3a; border-radius: 6px; padding: 8px 10px; color: #e0d9cc; font-family: 'Georgia', serif; font-size: 14px; margin-bottom: 10px; }
  textarea { resize: vertical; min-height: 70px; }
  .btn { background: #1a1a24; border: 1px solid #3a3a4a; border-radius: 6px; color: #e0d9cc; padding: 8px 18px; cursor: pointer; font-family: 'Georgia', serif; font-size: 14px; transition: all 0.15s; }
  .btn:hover { background: #2a2a3a; border-color: #c9a84c; }
  .btn-gold { background: #c9a84c; color: #0f0f13; border-color: #c9a84c; font-weight: bold; }
  .btn-gold:hover { background: #e0bc5a; }
  .btn-sm { padding: 5px 12px; font-size: 12px; }
  .btn-red { border-color: #8b3030; color: #e07070; }
  .toggle-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
  .toggle-opt { padding: 5px 14px; font-size: 12px; border-radius: 20px; border: 1px solid #2a2a3a; cursor: pointer; background: #0f0f13; color: #888; font-family: sans-serif; transition: all 0.15s; }
  .toggle-opt.on { background: #c9a84c; color: #0f0f13; border-color: #c9a84c; font-weight: bold; }
  .section-label { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; font-family: sans-serif; }
  .party-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .char-card { background: #111118; border: 1px solid #2a2a3a; border-radius: 8px; padding: 12px; }
  .story-log { min-height: 300px; max-height: 420px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; padding-right: 4px; margin-bottom: 12px; }
  .entry-dm { color: #e0d9cc; line-height: 1.8; font-size: 15px; }
  .entry-dm strong { color: #c9a84c; }
  .entry-dm em { color: #aaa; }
  .entry-player { color: #7a9a7a; font-style: italic; font-size: 14px; border-left: 2px solid #3a5a3a; padding-left: 10px; }
  .entry-system { color: #444; font-size: 12px; text-align: center; font-family: sans-serif; }
  .entry-dice { color: #7a9acc; font-size: 13px; text-align: center; font-family: sans-serif; font-weight: bold; }
  .entry-error { color: #cc7a7a; font-size: 13px; font-family: sans-serif; }
  .action-row { display: flex; gap: 8px; }
  .action-row input { flex: 1; margin-bottom: 0; }
  .quick-btns { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
  .dice-tray { display: flex; gap: 6px; flex-wrap: wrap; }
  .die-btn { padding: 5px 12px; font-size: 13px; border-radius: 6px; border: 1px solid #2a2a3a; cursor: pointer; background: #111118; color: #c9a84c; font-family: sans-serif; }
  .die-btn:hover { background: #1a1a24; border-color: #c9a84c; }
  .hp-grid { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
  .hp-chip { background: #111118; border: 1px solid #2a2a3a; border-radius: 6px; padding: 8px 12px; min-width: 120px; }
  .hp-chip .cn { font-size: 13px; font-weight: bold; color: #c9a84c; }
  .hp-chip .cc { font-size: 11px; color: #666; font-family: sans-serif; }
  .hp-chip .hv { font-size: 12px; margin-top: 4px; font-family: sans-serif; }
  .hp-bar { height: 4px; background: #222; border-radius: 2px; margin-top: 4px; }
  .hp-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }
  .loading { display: inline-flex; gap: 4px; align-items: center; }
  .loading span { width: 5px; height: 5px; border-radius: 50%; background: #c9a84c; animation: blink 1.2s infinite; }
  .loading span:nth-child(2) { animation-delay: 0.2s; }
  .loading span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,100%{opacity:0.2} 50%{opacity:1} }
  .nav { display: flex; gap: 16px; margin-bottom: 24px; border-bottom: 1px solid #2a2a3a; padding-bottom: 12px; }
  .nav-tab { font-size: 13px; color: #555; cursor: pointer; padding-bottom: 4px; border-bottom: 2px solid transparent; font-family: sans-serif; }
  .nav-tab.active { color: #c9a84c; border-bottom-color: #c9a84c; }
  .divider { border: none; border-top: 1px solid #2a2a3a; margin: 12px 0; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #0f0f13; }
  ::-webkit-scrollbar-thumb { background: #2a2a3a; border-radius: 3px; }
</style>
</head>
<body>
<div class="app">
  <h1>AI Dungeon Master</h1>
  <p class="subtitle">A living, breathing world — powered by AI</p>
  <div class="nav">
    <span class="nav-tab active" id="tab-settings" onclick="showTab('settings')">Settings</span>
    <span class="nav-tab" id="tab-party" onclick="showTab('party')">Party Builder</span>
    <span class="nav-tab" id="tab-game" onclick="showTab('game')">Adventure</span>
  </div>
  <div class="screen active" id="screen-settings">
    <div class="card">
      <h2>Content Settings</h2>
      <div class="section-label">Violence</div>
      <div class="toggle-row">
        <button class="toggle-opt" onclick="toggle('violence','none',this)">None</button>
        <button class="toggle-opt on" onclick="toggle('violence','mild',this)">Mild</button>
        <button class="toggle-opt" onclick="toggle('violence','graphic',this)">Graphic</button>
      </div>
      <div class="section-label">Sexual Content</div>
      <div class="toggle-row">
        <button class="toggle-opt on" onclick="toggle('sex','none',this)">None</button>
        <button class="toggle-opt" onclick="toggle('sex','mild',this)">Mild</button>
        <button class="toggle-opt" onclick="toggle('sex','explicit',this)">Explicit</button>
      </div>
      <div class="section-label">Language</div>
      <div class="toggle-row">
        <button class="toggle-opt" onclick="toggle('lang','clean',this)">Clean</button>
        <button class="toggle-opt on" onclick="toggle('lang','mild',this)">Mild</button>
        <button class="toggle-opt" onclick="toggle('lang','harsh',this)">Harsh</button>
      </div>
      <div class="section-label">Tone</div>
      <div class="toggle-row">
        <button class="toggle-opt" onclick="toggle('tone','heroic',this)">Heroic</button>
        <button class="toggle-opt on" onclick="toggle('tone','balanced',this)">Balanced</button>
        <button class="toggle-opt" onclick="toggle('tone','dark',this)">Grimdark</button>
        <button class="toggle-opt" onclick="toggle('tone','comedic',this)">Comedic</button>
      </div>
    </div>
    <div class="card">
      <h2>Campaign Setup</h2>
      <label>Campaign Name</label>
      <input type="text" id="campaign-name" value="The Shattered Realm">
      <label>World & Premise</label>
      <textarea id="campaign-premise">A dying empire on the edge of collapse. Ancient gods have gone silent. Dark cults rise in the power vacuum. The party is hired by a desperate noble to investigate disappearances in the border city of Ashenveil.</textarea>
      <label>DM Style</label>
      <select id="dm-style">
        <option value="classic">Classic & descriptive</option>
        <option value="action">Cinematic & fast-paced</option>
        <option value="mystery">Mystery-forward</option>
        <option value="horror">Horror</option>
        <option value="sandbox">Sandbox</option>
      </select>
    </div>
    <button class="btn btn-gold" onclick="showTab('party')">Next: Build Your Party</button>
  </div>
  <div class="screen" id="screen-party">
    <div class="card">
      <h2>Party Builder</h2>
      <div class="party-grid" id="party-grid"></div>
      <button class="btn btn-sm" id="add-char-btn" onclick="addChar()">+ Add Character (max 4)</button>
      <p id="party-err" style="color:#cc7a7a;font-size:13px;margin-top:8px;font-family:sans-serif;"></p>
    </div>
    <div style="display:flex;gap:10px;">
      <button class="btn" onclick="showTab('settings')">Back</button>
      <button class="btn btn-gold" onclick="startAdventure()">Begin the Adventure</button>
    </div>
  </div>
  <div class="screen" id="screen-game">
    <div id="hp-grid" class="hp-grid"></div>
    <div class="card">
      <div class="story-log" id="story-log">
        <div class="entry-system">Your adventure will begin here</div>
      </div>
      <hr class="divider">
      <div class="quick-btns">
        <button class="btn btn-sm" onclick="quickAct('We carefully examine our surroundings.')">Examine area</button>
        <button class="btn btn-sm" onclick="quickAct('We approach the nearest NPC and start a conversation.')">Talk to NPC</button>
        <button class="btn btn-sm" onclick="quickAct('We search for hidden passages or secrets.')">Search</button>
        <button class="btn btn-sm" onclick="quickAct('We rest and tend to our wounds.')">Rest</button>
        <button class="btn btn-sm" onclick="quickAct('We move forward cautiously.')">Move forward</button>
      </div>
      <div class="action-row">
        <input type="text" id="action-input" placeholder="What does your party do?" onkeydown="if(event.key==='Enter')sendAction()">
        <button class="btn btn-gold" onclick="sendAction()">Send</button>
      </div>
    </div>
    <div class="card">
      <div class="section-label">Dice Roller</div>
      <div class="dice-tray">
        <button class="die-btn" onclick="roll(4)">d4</button>
        <button class="die-btn" onclick="roll(6)">d6</button>
        <button class="die-btn" onclick="roll(8)">d8</button>
        <button class="die-btn" onclick="roll(10)">d10</button>
        <button class="die-btn" onclick="roll(12)">d12</button>
        <button class="die-btn" onclick="roll(20)">d20</button>
        <button class="die-btn" onclick="roll(100)">d100</button>
      </div>
      <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap;">
        <button class="btn btn-sm" onclick="adjustHP()">Adjust HP</button>
        <button class="btn btn-sm" onclick="summarize()">Session Summary</button>
        <button class="btn btn-sm btn-red" onclick="newSession()">New Campaign</button>
      </div>
    </div>
  </div>
</div>
<script>
const S = {
  settings: { violence:'mild', sex:'none', lang:'mild', tone:'balanced' },
  party: [],
  history: [],
  loading: false
};
const RACES = ['Human','Elf','Dwarf','Halfling','Half-Elf','Half-Orc','Gnome','Tiefling','Dragonborn','Aasimar'];
const CLASSES = ['Fighter','Wizard','Rogue','Cleric','Ranger','Paladin','Barbarian','Bard','Druid','Monk','Sorcerer','Warlock'];
function showTab(t) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(n => n.classList.remove('active'));
  document.getElementById('screen-'+t).classList.add('active');
  document.getElementById('tab-'+t).classList.add('active');
  if(t==='party') renderParty();
  if(t==='game') renderHP();
}
function toggle(key,val,el) {
  S.settings[key]=val;
  el.parentElement.querySelectorAll('.toggle-opt').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
}
function addChar() {
  if(S.party.length>=4) return;
  S.party.push({name:'',race:'Human',cls:'Fighter',backstory:'',hp:20,maxHp:20});
  renderParty();
}
function removeChar(i) { S.party.splice(i,1); renderParty(); }
function setChar(i,k,v) { S.party[i][k]=v; }
function renderParty() {
  const g=document.getElementById('party-grid');
  g.innerHTML='';
  S.party.forEach((c,i)=>{
    const d=document.createElement('div');
    d.className='char-card';
    d.innerHTML=`
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <span style="font-size:13px;color:#c9a84c;font-weight:bold;">Character ${i+1}</span>
        <button class="btn btn-sm btn-red" onclick="removeChar(${i})">Remove</button>
      </div>
      <label>Name</label>
      <input type="text" value="${c.name}" placeholder="Name..." onchange="setChar(${i},'name',this.value)">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
        <div><label>Race</label><select onchange="setChar(${i},'race',this.value)">${RACES.map(r=>`<option ${c.race===r?'selected':''}>${r}</option>`).join('')}</select></div>
        <div><label>Class</label><select onchange="setChar(${i},'cls',this.value)">${CLASSES.map(cl=>`<option ${c.cls===cl?'selected':''}>${cl}</option>`).join('')}</select></div>
      </div>
      <label>Starting HP</label>
      <input type="text" value="${c.maxHp}" onchange="setChar(${i},'maxHp',parseInt(this.value)||20);setChar(${i},'hp',parseInt(this.value)||20)">
      <label>Backstory</label>
      <textarea onchange="setChar(${i},'backstory',this.value)">${c.backstory}</textarea>
    `;
    g.appendChild(d);
  });
  document.getElementById('add-char-btn').style.display=S.party.length>=4?'none':'';
}
function renderHP() {
  const g=document.getElementById('hp-grid');
  g.innerHTML='';
  S.party.forEach((c,i)=>{
    const pct=Math.round(Math.max(0,c.hp/c.maxHp)*100);
    const col=pct>60?'#4a9a4a':pct>30?'#c9a84c':'#cc4444';
    g.innerHTML+=`<div class="hp-chip"><div class="cn">${c.name||'Character '+(i+1)}</div><div class="cc">${c.race} ${c.cls}</div><div class="hv">${c.hp}/${c.maxHp} HP</div><div class="hp-bar"><div class="hp-fill" style="width:${pct}%;background:${col};"></div></div></div>`;
  });
}
function buildSystemPrompt() {
  const sv={none:'No violence.',mild:'Mild violence is fine.',graphic:'Graphic realistic violence permitted.'}[S.settings.violence];
  const ss={none:'No sexual content.',mild:'Mild suggestive content only.',explicit:'Explicit sexual content permitted.'}[S.settings.sex];
  const sl={clean:'Clean language only.',mild:'Mild profanity ok.',harsh:'Harsh profanity permitted.'}[S.settings.lang];
  const st={heroic:'Heroic tone.',balanced:'Balanced tone.',dark:'Dark grimdark tone.',comedic:'Comedic tone.'}[S.settings.tone];
  const dm={classic:'Rich descriptive prose.',action:'Fast cinematic pacing.',mystery:'Intrigue and clues.',horror:'Dread and tension.',sandbox:'Player-driven reactive world.'}[document.getElementById('dm-style').value];
  const party=S.party.map((c,i)=>`${i+1}. ${c.name||'Unnamed'} - ${c.race} ${c.cls}${c.backstory?' ('+c.backstory+')':''} [HP: ${c.hp}/${c.maxHp}]`).join('\n');
  return `You are a Dungeon Master running a D&D campaign called "${document.getElementById('campaign-name').value}".
PREMISE: ${document.getElementById('campaign-premise').value}
PARTY:\n${party}
RULES: Violence: ${sv} Sex: ${ss} Language: ${sl} Tone: ${st} Style: ${dm}
Narrate vividly. Reference past events. End each response with a situation that invites player action. Use **bold** for names. Never break character.`;
}
async function callDM(userMsg) {
  if(S.loading) return;
  S.loading=true;
  addLog('player',userMsg);
  S.history.push({role:'user',content:userMsg});
  const loadEl=document.createElement('div');
  loadEl.className='entry-dm';
  loadEl.innerHTML='<div class="loading"><span></span><span></span><span></span></div>';
  document.getElementById('story-log').appendChild(loadEl);
  scrollLog();
  try {
    const res=await fetch('/api/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({messages:S.history,systemPrompt:buildSystemPrompt()})
    });
    const data=await res.json();
    if(data.error) throw new Error(data.error);
    S.history.push({role:'assistant',content:data.response});
    loadEl.innerHTML=formatDM(data.response);
  } catch(e) {
    loadEl.className='entry-error';
    loadEl.textContent='Error: '+e.message;
  }
  S.loading=false;
  scrollLog();
  renderHP();
}
function formatDM(text) {
  return text.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>').replace(/\n\n/g,'</p><p>').replace(/\n/g,'<br>');
}
function addLog(type,text) {
  const el=document.createElement('div');
  el.className='entry-'+type;
  el.innerHTML=type==='player'?'› '+text:formatDM(text);
  document.getElementById('story-log').appendChild(el);
  scrollLog();
}
function scrollLog() {
  const log=document.getElementById('story-log');
  log.scrollTop=log.scrollHeight;
}
function sendAction() {
  const inp=document.getElementById('action-input');
  const val=inp.value.trim();
  if(!val||S.loading) return;
  inp.value='';
  callDM(val);
}
function quickAct(text) { if(!S.loading) callDM(text); }
function roll(sides) {
  const result=Math.floor(Math.random()*sides)+1;
  addLog('dice',`d${sides} = ${result}${result===sides?' (CRITICAL!)':result===1?' (FUMBLE)':''}`);
}
function adjustHP() {
  if(S.party.length===0) return;
  const names=S.party.map((c,i)=>`${i}: ${c.name||'Char '+(i+1)}`).join(', ');
  const idx=prompt(`Which character? (${names})`);
  const i=parseInt(idx);
  if(isNaN(i)||!S.party[i]) return;
  const delta=prompt('Change HP by how much? (e.g. -8 for damage, +5 for healing)');
  const d=parseInt(delta);
  if(isNaN(d)) return;
  S.party[i].hp=Math.max(0,Math.min(S.party[i].maxHp,S.party[i].hp+d));
  addLog('system',`${S.party[i].name||'Character '+(i+1)} ${d<0?'takes '+Math.abs(d)+' damage':'heals '+d+' HP'} (${S.party[i].hp}/${S.party[i].maxHp} HP)`);
  renderHP();
}
function summarize() { callDM('Please summarize everything that has happened in our session so far.'); }
function newSession() {
  if(!confirm('Start a new campaign? This clears all history.')) return;
  S.history=[];
  S.party=[];
  document.getElementById('story-log').innerHTML='<div class="entry-system">Your adventure will begin here</div>';
  showTab('settings');
}
function startAdventure() {
  if(S.party.length===0) { document.getElementById('party-err').textContent='Add at least one character.'; return; }
  if(S.party.some(c=>!c.name.trim())) { document.getElementById('party-err').textContent='All characters need a name.'; return; }
  document.getElementById('party-err').textContent='';
  S.history=[];
  showTab('game');
  renderHP();
  const partyDesc=S.party.map(c=>`${c.name} the ${c.race} ${c.cls}`).join(', ');
  callDM(`Begin the campaign. Set the opening scene and draw the party (${partyDesc}) into the adventure. Make it vivid and immediately engaging.`);
}
</script>
</body>
</html>
